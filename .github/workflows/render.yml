name: Render Videos

on:
  push:
    paths:
      - 'queue/*.json'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Remotion browser
        run: npx remotion browser ensure

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Supabase SDK
        run: npm install @supabase/supabase-js

      - name: Render videos from queue
        run: node scripts/render-queue.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Commit processed queue
        run: |
          git config user.name "MAX Robot"
          git config user.email "max@conceptodevelopment.com"
          git add queue/
          git diff --staged --quiet || git commit -m "✅ queue procesada"
          git push
